<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./src/icon/favicon-32x32.png">
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
    <main>
        <div class="card-component">
            <div class="card-component__card-image-container">
                <img srcset="./src/img/image-product-desktop.jpg 376w,
                             ./src/img/image-product-mobile.jpg 375w"
                     sizes="(max-width: 375px) 375px, 376px"
                     src="./src/img/image-product-desktop.jpg"
                     alt="Product"
                     class="card-image-container__card-image"
                     >
            </div>
            <div class="card-component__card-summary">
                <p class="card-summary__item-type">Perfume</p>
                <p class="card-summary__item-title">Gabrielle Essence Eau De Parfum</p>
                <p class="card-summary__item-summary">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
                <div>
                    <p>$149.99</p>
                    <p>$169.99</p>
                </div>
                <input type="button" value="Add to Cart">
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.</p>
        <p>Coded by <a href="#">Mykola Pyroh</a>.</p>
    </footer>
</body>
</html>
